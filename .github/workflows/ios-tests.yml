name: iOS Tests

on:
  pull_request:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run stable iOS gate
        run: ./scripts/test-ios.sh stable

      - name: Summarize stable gate xcresults
        if: always()
        run: ./scripts/xcresult-summary.sh --all .deriveddata/codex-tests/Logs/Test

      - name: Write markdown stable gate summary
        if: always()
        run: ./scripts/xcresult-summary.sh --all .deriveddata/codex-tests/Logs/Test --markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Export stable gate JSON summary
        if: always()
        run: ./scripts/xcresult-summary.sh --all .deriveddata/codex-tests/Logs/Test --json > .deriveddata/codex-tests/xcresult-summary-stable-gate.json

      - name: Upload xcresult bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-bundles
          path: .deriveddata/codex-tests/Logs/Test/*.xcresult
          if-no-files-found: ignore

      - name: Upload xcresult JSON summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-summary-json
          path: .deriveddata/codex-tests/xcresult-summary-stable-gate.json
          if-no-files-found: ignore
