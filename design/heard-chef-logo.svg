    <ellipse cx="210" cy="370" rx="18" ry="12" class="cheek" transform="rotate(-10, 210, 370)"/>

    <ellipse cx="365" cy="355" rx="18" ry="12" class="cheek" transform="rotate(-10, 365, 355)"/>

    <path class="mouth-bg" d="M 245,375
